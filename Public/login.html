<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #eef3ff 0%, #ffffff 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1f2937;
    }
    .box {
      width: 100%;
      max-width: 430px;
      background: #ffffff;
      padding: 28px;
      border-radius: 22px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
    input, button, a.btn {
      width: 100%;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid #d7dce5;
      font-size: 15px;
      margin-bottom: 12px;
      box-sizing: border-box;
      background: white;
      color: #1f2937;
      display: block;
      text-align: center;
      text-decoration: none;
    }
    button {
      background: linear-gradient(135deg, #6c63ff, #8b5cf6);
      color: white;
      border: none;
      font-weight: 700;
      cursor: pointer;
    }
    .admin-btn {
      background: linear-gradient(135deg, #111827, #374151);
      color: white;
      border: none;
      font-weight: 700;
      cursor: pointer;
    }
    .msg { color: #dc2626; min-height: 20px; margin-bottom: 12px; }
    .divider {
      text-align: center;
      color: #6b7280;
      margin: 14px 0;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Entrar</h1>
    <div id="msg" class="msg"></div>

    <input id="username" placeholder="Nome de utilizador" />
    <input id="password" type="password" placeholder="Senha" />

    <button id="loginBtn">Login</button>

    <div class="divider">ou</div>

    <button class="admin-btn" id="adminLoginBtn">Login usuário principal</button>

    <p><a href="register.html">Registar</a></p>
  </div>

  <script>
    const msg = document.getElementById('msg');
    const username = document.getElementById('username');
    const password = document.getElementById('password');

    async function loginNormal() {
      msg.textContent = '';
      const res = await fetch('/api/login', {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: username.value.trim(), password: password.value })
      });

      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        msg.textContent = data.error || 'Credenciais inválidas.';
        return false;
      }

      window.location.href = 'menu.html';
      return true;
    }

    async function loginAdmin() {
      msg.textContent = '';
      const res = await fetch('/api/admin-login', {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: username.value.trim(), password: password.value })
      });

      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        msg.textContent = data.error || 'Acesso restrito ao usuário principal.';
        return;
      }

      window.location.href = 'admin.html';
    }

    document.getElementById('loginBtn').addEventListener('click', loginNormal);
    document.getElementById('adminLoginBtn').addEventListener('click', loginAdmin);
  </script>
</body>
</html>
