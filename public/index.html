<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Desabafa</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a, #1e3a8a);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      padding: 28px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 12px;
    }

    p {
      line-height: 1.5;
      margin-bottom: 18px;
      color: #e5e7eb;
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 14px 16px;
      margin-top: 10px;
      font-size: 1rem;
      cursor: pointer;
    }

    .btn-primary {
      background: #22c55e;
      color: white;
      font-weight: bold;
    }

    .btn-secondary {
      background: #2563eb;
      color: white;
    }

    .btn-light {
      background: white;
      color: #111827;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border: none;
      border-radius: 12px;
      outline: none;
      font-size: 1rem;
      margin-top: 10px;
    }

    .section {
      display: none;
    }

    .visible {
      display: block;
    }

    .small {
      font-size: 0.9rem;
      color: #cbd5e1;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="welcome-section">
      <h1>Desabafa</h1>
      <p>Um espaço simples e anónimo para falares sem pressão.</p>
      <button class="btn btn-primary" onclick="showNicknameSection()">Começar</button>
      <button class="btn btn-secondary" onclick="window.location.href='/login.html'">Entrar</button>
      <div class="small">Se for a tua primeira vez, clica em Começar.</div>
    </div>

    <div id="nickname-section" class="section">
      <h1>Escolhe um nome fictício</h1>
      <p>Este nome vai ser usado só dentro da plataforma.</p>
      <input type="text" id="nickname" placeholder="Ex: Lua, Azul, Nuvem..." />
      <button class="btn btn-primary" onclick="startApp()">Continuar</button>
      <button class="btn btn-light" onclick="backToWelcome()">Voltar</button>
    </div>
  </div>

  <script>
    function showNicknameSection() {
      document.getElementById('welcome-section').style.display = 'none';
      document.getElementById('nickname-section').style.display = 'block';
    }

    function backToWelcome() {
      document.getElementById('nickname-section').style.display = 'none';
      document.getElementById('welcome-section').style.display = 'block';
    }

    function startApp() {
      const name = document.getElementById('nickname').value.trim();
      if (!name) {
        alert('Escreve um nome fictício.');
        return;
      }
      localStorage.setItem('nickname', name);
      window.location.href = '/menu.html';
    }
  </script>
</body>
</html>
