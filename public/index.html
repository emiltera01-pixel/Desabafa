<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Desabafa</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a, #1e3a8a);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .app {
      width: 100%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      padding: 28px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 12px;
    }

    p {
      line-height: 1.5;
      margin-bottom: 18px;
      color: #e5e7eb;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border: none;
      border-radius: 12px;
      outline: none;
      font-size: 1rem;
      margin-top: 10px;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 14px 16px;
      margin-top: 12px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: bold;
    }

    .primary {
      background: #22c55e;
      color: white;
    }

    .secondary {
      background: white;
      color: #111827;
    }

    .hidden {
      display: none;
    }

    .small {
      margin-top: 10px;
      font-size: 0.9rem;
      color: #cbd5e1;
    }
  </style>
</head>
<body>
  <div class="app">
    <div id="nickname-box">
      <h1>Desabafa</h1>
      <p>Escolhe um nome fictício para entrares na plataforma.</p>
      <input type="text" id="nickname" placeholder="Ex: Lua, Azul, Nuvem..." />
      <button class="primary" onclick="startApp()">Entrar</button>
      <div class="small">O nome fica guardado neste dispositivo.</div>
    </div>
  </div>

  <script>
    window.addEventListener('load', () => {
      const saved = localStorage.getItem('nickname');
      if (saved) {
        document.getElementById('nickname').value = saved;
      }
    });

    function startApp() {
      const name = document.getElementById('nickname').value.trim();
      if (!name) {
        alert('Escreve um nome fictício.');
        return;
      }
      localStorage.setItem('nickname', name);
      window.location.href = '/menu.html';
    }
  </script>
</body>
</html>
